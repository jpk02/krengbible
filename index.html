<script>
var C=[
[["하나님의 뜻으로 말미암아 그리스도 예수의 사도 된 바울은 에베소에 있는 성도들과 그리스도 예수 안에 있는 신실한 자들에게 편지하노니","Paul, an apostle of Christ Jesus by the will of God, To the saints who are in Ephesus, and are faithful in Christ Jesus:"],["하나님 우리 아버지와 주 예수 그리스도로부터 은혜와 평강이 너희에게 있을지어다","Grace to you and peace from God our Father and the Lord Jesus Christ."],["찬송하리로다 하나님 곧 우리 주 예수 그리스도의 아버지께서 그리스도 안에서 하늘에 속한 모든 신령한 복을 우리에게 주시되","Blessed be the God and Father of our Lord Jesus Christ, who has blessed us in Christ with every spiritual blessing in the heavenly places,"],["곧 창세 전에 그리스도 안에서 우리를 택하사 우리로 사랑 안에서 그 앞에 거룩하고 흠이 없게 하시려고","even as he chose us in him before the foundation of the world, that we should be holy and blameless before him. In love"],["그 기쁘신 뜻대로 우리를 예정하사 예수 그리스도로 말미암아 자기의 아들들이 되게 하셨으니","he predestined us for adoption to himself as sons through Jesus Christ, according to the purpose of his will,"],["이는 그가 사랑하시는 자 안에서 우리에게 거저 주시는 바 그의 은혜의 영광을 찬송하게 하려는 것이라","to the praise of his glorious grace, with which he has blessed us in the Beloved."],["우리는 그리스도 안에서 그의 은혜의 풍성함을 따라 그의 피로 말미암아 속량 곧 죄 사함을 받았느니라","In him we have redemption through his blood, the forgiveness of our trespasses, according to the riches of his grace,"],["이는 그가 모든 지혜와 총명을 우리에게 넘치게 하사","which he lavished upon us, in all wisdom and insight"],["그 뜻의 비밀을 우리에게 알리신 것이요 그의 기뻐하심을 따라 그리스도 안에서 때가 찬 경륜을 위하여 예정하신 것이니","making known to us the mystery of his will, according to his purpose, which he set forth in Christ"],["하늘에 있는 것이나 땅에 있는 것이 다 그리스도 안에서 통일되게 하려 하심이라","as a plan for the fullness of time, to unite all things in him, things in heaven and things on earth."],["모든 일을 그의 뜻의 결정대로 일하시는 이의 계획을 따라 우리가 예정을 입어 그 안에서 기업이 되었으니","In him we have obtained an inheritance, having been predestined according to the purpose of him who works all things according to the counsel of his will,"],["이는 우리가 그리스도 안에서 전부터 바라던 그의 영광의 찬송이 되게 하려 하심이라","so that we who were the first to hope in Christ might be to the praise of his glory."],["그 안에서 너희도 진리의 말씀 곧 너희의 구원의 복음을 듣고 그 안에서 또한 믿어 약속의 성령으로 인치심을 받았으니","In him you also, when you heard the word of truth, the gospel of your salvation, and believed in him, were sealed with the promised Holy Spirit,"],["이 성령이 우리 기업의 보증이 되사 그 얻으신 것을 속량하시고 그의 영광을 찬송하게 하려 하심이라","who is the guarantee of our inheritance until we acquire possession of it, to the praise of his glory."],["이로 말미암아 주 예수 안에서 너희 믿음과 모든 성도를 향한 사랑을 나도 듣고","For this reason, because I have heard of your faith in the Lord Jesus and your love toward all the saints,"],["내가 기도할 때에 너희로 말미암아 감사하기를 그치지 아니하고 너희를 기억하며","I do not cease to give thanks for you, remembering you in my prayers,"],["우리 주 예수 그리스도의 하나님 영광의 아버지께서 지혜와 계시의 영을 너희에게 주사 하나님을 알게 하시고","that the God of our Lord Jesus Christ, the Father of glory, may give you the Spirit of wisdom and of revelation in the knowledge of him,"],["너희 마음의 눈을 밝히사 그의 부르심의 소망이 무엇이며 성도 안에서 그 기업의 영광의 풍성함이 무엇이며","having the eyes of your hearts enlightened, that you may know what is the hope to which he has called you, what are the riches of his glorious inheritance in the saints,"],["그의 힘의 위력으로 역사하심을 따라 믿는 우리에게 베푸신 능력의 지극히 크심이 어떠한 것을 너희로 알게 하시기를 구하노라","and what is the immeasurable greatness of his power toward us who believe, according to the working of his great might"],["그의 능력이 그리스도 안에서 역사하사 죽은 자들 가운데서 다시 살리시고 하늘에서 자기의 오른편에 앉히사","that he worked in Christ when he raised him from the dead and seated him at his right hand in the heavenly places,"],["모든 통치와 권세와 능력과 주권과 이 세상뿐 아니라 오는 세상에 일컫는 모든 이름 위에 뛰어나게 하시고","far above all rule and authority and power and dominion, and above every name that is named, not only in this age but also in the one to come."],["또 만물을 그의 발 아래에 복종하게 하시고 그를 만물 위에 교회의 머리로 삼으셨느니라","And he put all things under his feet and gave him as head over all things to the church,"],["교회는 그의 몸이니 만물 안에서 만물을 충만하게 하시는 이의 충만함이니라","which is his body, the fullness of him who fills all in all."]],
[["그는 허물과 죄로 죽었던 너희를 살리셨도다","And you were dead in the trespasses and sins"],["그 때에 너희는 그 가운데서 행하여 이 세상 풍조를 따르고 공중의 권세 잡은 자를 따랐으니 곧 지금 불순종의 아들들 가운데서 역사하는 영이라","in which you once walked, following the course of this world, following the prince of the power of the air, the spirit that is now at work in the sons of disobedience,"],["전에는 우리도 다 그 가운데서 우리 육체의 욕심을 따라 지내며 육체와 마음의 원하는 것을 하여 다른 이들과 같이 본질상 진노의 자녀이었더니","among whom we all once lived in the passions of our flesh, carrying out the desires of the body and the mind, and were by nature children of wrath, like the rest of mankind."],["긍휼이 풍성하신 하나님이 우리를 사랑하신 그 큰 사랑을 인하여","But God, being rich in mercy, because of the great love with which he loved us,"],["허물로 죽은 우리를 그리스도와 함께 살리셨고 너희는 은혜로 구원을 받은 것이라","even when we were dead in our trespasses, made us alive together with Christ - by grace you have been saved -"],["또 함께 일으키사 그리스도 예수 안에서 함께 하늘에 앉히시니","and raised us up with him and seated us with him in the heavenly places in Christ Jesus,"],["이는 그리스도 예수 안에서 우리에게 자비하심으로써 그 은혜의 지극히 풍성함을 오는 여러 세대에 나타내려 하심이라","so that in the coming ages he might show the immeasurable riches of his grace in kindness toward us in Christ Jesus."],["너희는 그 은혜에 의하여 믿음으로 말미암아 구원을 받았으니 이것은 너희에게서 난 것이 아니요 하나님의 선물이라","For by grace you have been saved through faith. And this is not your own doing; it is the gift of God,"],["행위에서 난 것이 아니니 이는 누구든지 자랑하지 못하게 함이라","not a result of works, so that no one may boast."],["우리는 그가 만드신 바라 그리스도 예수 안에서 선한 일을 위하여 지으심을 받은 자니 이 일은 하나님이 전에 예비하사 우리로 그 가운데서 행하게 하려 하심이니라","For we are his workmanship, created in Christ Jesus for good works, which God prepared beforehand, that we should walk in them."],["그러므로 생각하라 너희는 그 때에 육체로 이방인이요 손으로 육체에 행한 할례라 칭하는 자들에게 무할례자라 칭함을 받는 자들이라","Therefore remember that at one time you Gentiles in the flesh, called the uncircumcision by what is called the circumcision, which is made in the flesh by hands,"],["그 때에 너희는 그리스도 밖에 있었고 이스라엘 나라 밖의 사람이라 약속의 언약들에 대하여 외인이요 세상에서 소망이 없고 하나님도 없는 자이더니","remember that you were at that time separated from Christ, alienated from the commonwealth of Israel and strangers to the covenants of promise, having no hope and without God in the world."],["이제는 전에 멀리 있던 너희가 그리스도 예수 안에서 그리스도의 피로 가까워졌느니라","But now in Christ Jesus you who once were far off have been brought near by the blood of Christ."],["그는 우리의 화평이신지라 둘로 하나를 만드사 원수 된 것 곧 중간에 막힌 담을 자기 육체로 허시고","For he himself is our peace, who has made us both one and has broken down in his flesh the dividing wall of hostility"],["법조문으로 된 계명의 율법을 폐하셨으니 이는 이 둘로 자기 안에서 한 새 사람을 지어 화평하게 하시고","by abolishing the law of commandments expressed in ordinances, that he might create in himself one new man in place of the two, so making peace,"],["또 십자가로 이 둘을 한 몸으로 하나님과 화목하게 하려 하심이라 원수 된 것을 십자가로 소멸하시고","and might reconcile us both to God in one body through the cross, thereby killing the hostility."],["또 오셔서 먼 데 있는 너희에게 평안을 전하고 가까운 데 있는 자들에게 평안을 전하셨으니","And he came and preached peace to you who were far off and peace to those who were near."],["이는 그로 말미암아 우리 둘이 한 성령 안에서 아버지께 나아감을 얻게 하려 하심이라","For through him we both have access in one Spirit to the Father."],["그러므로 이제부터 너희는 외인도 아니요 나그네도 아니요 오직 성도들과 동일한 시민이요 하나님의 권속이라","So then you are no longer strangers and aliens, but you are fellow citizens with the saints and members of the household of God,"],["너희는 사도들과 선지자들의 터 위에 세우심을 입은 자라 그리스도 예수께서 친히 모퉁잇돌이 되셨느니라","built on the foundation of the apostles and prophets, Christ Jesus himself being the cornerstone,"],["그의 안에서 건물마다 서로 연결하여 주 안에서 성전이 되어 가고","in whom the whole structure, being joined together, grows into a holy temple in the Lord."],["너희도 성령 안에서 하나님이 거하실 처소가 되기 위하여 그리스도 예수 안에서 함께 지어져 가느니라","In him you also are being built together into a dwelling place for God by the Spirit."]],
[["이러므로 그리스도 예수의 일로 너희 이방인을 위하여 갇힌 자 된 나 바울이 말하거니와","For this reason I, Paul, a prisoner of Christ Jesus on behalf of you Gentiles,"],["너희를 위하여 내게 주신 하나님의 그 은혜의 경륜을 너희가 들었을 터이라","assuming that you have heard of the stewardship of God's grace that was given to me for you,"],["곧 계시로 내게 비밀을 알게 하신 것은 내가 이미 간단히 기록함과 같으니","how the mystery was made known to me by revelation, as I have written briefly."],["그것을 읽으면 내가 그리스도의 비밀을 깨달은 것을 너희가 알 수 있으리라","When you read this, you can perceive my insight into the mystery of Christ,"],["이제 그의 거룩한 사도들과 선지자들에게 성령으로 나타내신 것 같이 다른 세대에서는 사람의 아들들에게 알리지 아니하셨으니","which was not made known to the sons of men in other generations as it has now been revealed to his holy apostles and prophets by the Spirit."],["이는 이방인들이 복음으로 말미암아 그리스도 예수 안에서 함께 상속자가 되고 함께 지체가 되고 함께 약속에 참여하는 자가 됨이라","This mystery is that the Gentiles are fellow heirs, members of the same body, and partakers of the promise in Christ Jesus through the gospel."],["이 복음을 위하여 그의 능력이 역사하시는 대로 내게 주신 하나님의 은혜의 선물을 따라 내가 일꾼이 되었노라","Of this gospel I was made a minister according to the gift of God's grace, which was given me by the working of his power."],["모든 성도 중에 지극히 작은 자보다 더 작은 나에게 이 은혜를 주신 것은 측량할 수 없는 그리스도의 풍성함을 이방인에게 전하게 하시고","To me, though I am the very least of all the saints, this grace was given, to preach to the Gentiles the unsearchable riches of Christ,"],["영원부터 만물을 창조하신 하나님 속에 감추어졌던 비밀의 경륜이 어떠한 것을 드러내게 하려 하심이라","and to bring to light for everyone what is the plan of the mystery hidden for ages in God, who created all things,"],["이는 이제 교회로 말미암아 하늘에 있는 통치자들과 권세들에게 하나님의 각종 지혜를 알게 하려 하심이니","so that through the church the manifold wisdom of God might now be made known to the rulers and authorities in the heavenly places."],["곧 영원부터 우리 주 그리스도 예수 안에서 예정하신 뜻대로 하신 것이라","This was according to the eternal purpose that he has realized in Christ Jesus our Lord,"],["우리가 그 안에서 그를 믿음으로 말미암아 담대함과 확신을 가지고 하나님께 나아감을 얻느니라","in whom we have boldness and access with confidence through our faith in him."],["그러므로 너희에게 구하노니 너희를 위한 나의 여러 환난에 대하여 낙심하지 말라 이는 너희의 영광이니라","So I ask you not to lose heart over what I am suffering for you, which is your glory."],["이러하므로 내가 하늘과 땅에 있는 각 족속에게","For this reason I bow my knees before the Father,"],["이름을 주신 아버지 앞에 무릎을 꿇고 비노니","from whom every family in heaven and on earth is named,"],["그의 영광의 풍성함을 따라 그의 성령으로 말미암아 너희 속사람을 능력으로 강건하게 하시오며","that according to the riches of his glory he may grant you to be strengthened with power through his Spirit in your inner being,"],["믿음으로 말미암아 그리스도께서 너희 마음에 계시게 하시옵고 너희가 사랑 가운데서 뿌리가 박히고 터가 굳어져서","so that Christ may dwell in your hearts through faith - that you, being rooted and grounded in love,"],["능히 모든 성도와 함께 지식에 넘치는 그리스도의 사랑을 알고","may have strength to comprehend with all the saints what is the breadth and length and height and depth,"],["그 너비와 길이와 높이와 깊이가 어떠함을 깨달아 하나님의 모든 충만하신 것으로 너희에게 충만하게 하시기를 구하노라","and to know the love of Christ that surpasses knowledge, that you may be filled with all the fullness of God."],["우리 가운데서 역사하시는 능력대로 우리가 구하거나 생각하는 모든 것에 더 넘치도록 능히 하실 이에게","Now to him who is able to do far more abundantly than all that we ask or think, according to the power at work within us,"],["교회 안에서와 그리스도 예수 안에서 영광이 대대로 영원무궁하기를 원하노라 아멘","to him be glory in the church and in Christ Jesus throughout all generations, forever and ever. Amen."]],
[["그러므로 주 안에서 갇힌 내가 너희를 권하노니 너희가 부르심을 받은 일에 합당하게 행하여","I therefore, a prisoner for the Lord, urge you to walk in a manner worthy of the calling to which you have been called,"],["모든 겸손과 온유로 하고 오래 참음으로 사랑 가운데서 서로 용납하고","with all humility and gentleness, with patience, bearing with one another in love,"],["평안의 매는 줄로 성령이 하나 되게 하신 것을 힘써 지키라","eager to maintain the unity of the Spirit in the bond of peace."],["몸이 하나요 성령도 한 분이시니 이와 같이 너희가 부르심의 한 소망 안에서 부르심을 받았느니라","There is one body and one Spirit - just as you were called to the one hope that belongs to your call -"],["주도 한 분이시요 믿음도 하나요 세례도 하나요","one Lord, one faith, one baptism,"],["하나님도 한 분이시니 곧 만유의 아버지시라 만유 위에 계시고 만유를 통일하시고 만유 가운데 계시도다","one God and Father of all, who is over all and through all and in all."],["우리 각 사람에게 그리스도의 선물의 분량대로 은혜를 주셨나니","But grace was given to each one of us according to the measure of Christ's gift."],["그러므로 이르기를 그가 위로 올라가실 때에 사로잡혔던 자들을 사로잡으시고 사람들에게 선물을 주셨다 하였도다","Therefore it says, When he ascended on high he led a host of captives, and he gave gifts to men."],["올라가셨다 하였은즉 땅 아래 낮은 곳으로 내리셨던 것이 아니면 무엇이냐","In saying He ascended, what does it mean but that he had also descended into the lower regions, the earth?"],["내리셨던 그가 곧 모든 하늘 위에 오르신 자니 이는 만물을 충만하게 하려 하심이라","He who descended is the one who also ascended far above all the heavens, that he might fill all things."],["그가 어떤 사람은 사도로, 어떤 사람은 선지자로, 어떤 사람은 복음 전하는 자로, 어떤 사람은 목사와 교사로 삼으셨으니","And he gave the apostles, the prophets, the evangelists, the shepherds and teachers,"],["이는 성도를 온전하게 하여 봉사의 일을 하게 하며 그리스도의 몸을 세우려 하심이라","to equip the saints for the work of ministry, for building up the body of Christ,"],["우리가 다 하나님의 아들을 믿는 것과 아는 일에 하나가 되어 온전한 사람을 이루어 그리스도의 장성한 분량이 충만한 데까지 이르리니","until we all attain to the unity of the faith and of the knowledge of the Son of God, to mature manhood, to the measure of the stature of the fullness of Christ,"],["이는 우리가 이제부터 어린 아이가 되지 아니하여 사람의 속임수와 간사한 유혹에 빠져 온갖 교훈의 풍조에 밀려 요동하지 않게 하려 함이라","so that we may no longer be children, tossed to and fro by the waves and carried about by every wind of doctrine, by human cunning, by craftiness in deceitful schemes."],["오직 사랑 안에서 참된 것을 하여 범사에 그에게까지 자랄지라 그는 머리니 곧 그리스도라","Rather, speaking the truth in love, we are to grow up in every way into him who is the head, into Christ,"],["그에게서 온 몸이 각 마디를 통하여 도움을 받음으로 연결되고 결합되어 각 지체의 분량대로 역사하여 그 몸을 자라게 하며 사랑 안에서 스스로 세우느니라","from whom the whole body, joined and held together by every joint with which it is equipped, when each part is working properly, makes the body grow so that it builds itself up in love."],["그러므로 내가 이것을 말하며 주 안에서 증언하노니 이제부터 너희는 이방인이 그 마음의 허망한 것으로 행함 같이 행하지 말라","Now this I say and testify in the Lord, that you must no longer walk as the Gentiles do, in the futility of their minds."],["그들의 총명이 어두워지고 그들 가운데 있는 무지함과 그들의 마음이 굳어짐으로 말미암아 하나님의 생명에서 떠나 있도다","They are darkened in their understanding, alienated from the life of God because of the ignorance that is in them, due to their hardness of heart."],["그들이 감각 없는 자가 되어 자신을 방탕에 방임하여 모든 더러운 것을 욕심으로 행하되","They have become callous and have given themselves up to sensuality, greedy to practice every kind of impurity."],["오직 너희는 그리스도를 그같이 배우지 아니하였느니라","But that is not the way you learned Christ!"],["진리가 예수 안에 있는 것 같이 너희가 과연 그에게서 듣고 또한 그 안에서 가르침을 받았을진대","assuming that you have heard about him and were taught in him, as the truth is in Jesus,"],["너희는 유혹의 욕심을 따라 썩어져 가는 구습을 따르는 옛 사람을 벗어 버리고","to put off your old self, which belongs to your former manner of life and is corrupt through deceitful desires,"],["오직 너희의 심령이 새롭게 되어","and to be renewed in the spirit of your minds,"],["하나님을 따라 의와 진리의 거룩함으로 지으심을 받은 새 사람을 입으라","and to put on the new self, created after the likeness of God in true righteousness and holiness."],["그런즉 거짓을 버리고 각각 그 이웃과 더불어 참된 것을 말하라 이는 우리가 서로 지체가 됨이라","Therefore, having put away falsehood, let each one of you speak the truth with his neighbor, for we are members one of another."],["분을 내어도 죄를 짓지 말며 해가 지도록 분을 품지 말고","Be angry and do not sin; do not let the sun go down on your anger,"],["마귀에게 틈을 주지 말라","and give no opportunity to the devil."],["도둑질하는 자는 다시 도둑질하지 말고 돌이켜 가난한 자에게 구제할 수 있도록 자기 손으로 수고하여 선한 일을 하라","Let the thief no longer steal, but rather let him labor, doing honest work with his own hands, so that he may have something to share with anyone in need."],["무릇 더러운 말은 너희 입 밖에도 내지 말고 오직 덕을 세우는 데 소용되는 대로 선한 말을 하여 듣는 자들에게 은혜를 끼치게 하라","Let no corrupting talk come out of your mouths, but only such as is good for building up, as fits the occasion, that it may give grace to those who hear."],["하나님의 성령을 근심하게 하지 말라 그 안에서 너희가 구원의 날까지 인치심을 받았느니라","And do not grieve the Holy Spirit of God, by whom you were sealed for the day of redemption."],["너희는 모든 악독과 노함과 분냄과 떠드는 것과 비방하는 것을 모든 악의와 함께 버리고","Let all bitterness and wrath and anger and clamor and slander be put away from you, along with all malice."],["서로 친절하게 하며 불쌍히 여기며 서로 용서하기를 하나님이 그리스도 안에서 너희를 용서하심과 같이 하라","Be kind to one another, tenderhearted, forgiving one another, as God in Christ forgave you."]],
[["그러므로 사랑을 받는 자녀 같이 너희는 하나님을 본받는 자가 되고","Therefore be imitators of God, as beloved children."],["그리스도께서 너희를 사랑하신 것 같이 너희도 사랑 가운데서 행하라 그는 우리를 위하여 자신을 버리사 향기로운 제물과 희생제물로 하나님께 드리셨느니라","And walk in love, as Christ loved us and gave himself up for us, a fragrant offering and sacrifice to God."],["음행과 온갖 더러운 것과 탐욕은 너희 중에서 그 이름조차도 부르지 말라 이는 성도에게 마땅한 바니라","But sexual immorality and all impurity or covetousness must not even be named among you, as is proper among saints."],["누추함과 어리석은 말이나 희롱의 말이 마땅하지 아니하니 오히려 감사하는 말을 하라","Let there be no filthiness nor foolish talk nor crude joking, which are out of place, but instead let there be thanksgiving."],["너희도 정녕 이것을 알거니와 음행하는 자나 더러운 자나 탐하는 자 곧 우상 숭배자는 다 그리스도와 하나님의 나라에서 기업을 얻지 못하리니","For you may be sure of this, that everyone who is sexually immoral or impure, or who is covetous, has no inheritance in the kingdom of Christ and God."],["누구든지 헛된 말로 너희를 속이지 못하게 하라 이로 말미암아 하나님의 진노가 불순종의 아들들에게 임하나니","Let no one deceive you with empty words, for because of these things the wrath of God comes upon the sons of disobedience."],["그러므로 그들과 함께 하는 자가 되지 말라","Therefore do not become partners with them;"],["너희가 전에는 어둠이더니 이제는 주 안에서 빛이라 빛의 자녀들처럼 행하라","for at one time you were darkness, but now you are light in the Lord. Walk as children of light"],["빛의 열매는 모든 착함과 의로움과 진실함에 있느니라","for the fruit of light is found in all that is good and right and true,"],["주를 기쁘시게 할 것이 무엇인가 시험하여 보라","and try to discern what is pleasing to the Lord."],["너희는 열매 없는 어둠의 일에 참여하지 말고 도리어 책망하라","Take no part in the unfruitful works of darkness, but instead expose them."],["그들이 은밀히 행하는 것들은 말하기도 부끄러우니라","For it is shameful even to speak of the things that they do in secret."],["그러나 책망을 받는 모든 것은 빛으로 말미암아 드러나나니","But when anything is exposed by the light, it becomes visible,"],["드러나는 것마다 빛이니라 그러므로 이르시기를 잠자는 자여 깨어서 죽은 자들 가운데서 일어나라 그리스도께서 네게 비추이시리라 하셨느니라","for anything that becomes visible is light. Therefore it says, Awake O sleeper and arise from the dead and Christ will shine on you."],["그런즉 너희가 어떻게 행할지를 자세히 주의하여 지혜 없는 자 같이 하지 말고 오직 지혜 있는 자 같이 하여","Look carefully then how you walk, not as unwise but as wise,"],["세월을 아끼라 때가 악하니라","making the best use of the time, because the days are evil."],["그러므로 어리석은 자가 되지 말고 오직 주의 뜻이 무엇인가 이해하라","Therefore do not be foolish, but understand what the will of the Lord is."],["술 취하지 말라 이는 방탕한 것이니 오직 성령으로 충만함을 받으라","And do not get drunk with wine, for that is debauchery, but be filled with the Spirit,"],["시와 찬송과 신령한 노래들로 서로 화답하며 너희의 마음으로 주께 노래하며 찬송하며","addressing one another in psalms and hymns and spiritual songs, singing and making melody to the Lord with your heart,"],["범사에 우리 주 예수 그리스도의 이름으로 항상 아버지 하나님께 감사하며","giving thanks always and for everything to God the Father in the name of our Lord Jesus Christ,"],["그리스도를 경외함으로 피차 복종하라","submitting to one another out of reverence for Christ."],["아내들이여 자기 남편에게 복종하기를 주께 하듯 하라","Wives, submit to your own husbands, as to the Lord."],["이는 남편이 아내의 머리 됨이 그리스도께서 교회의 머리 됨과 같음이니 그가 바로 몸의 구주시니라","For the husband is the head of the wife even as Christ is the head of the church, his body, and is himself its Savior."],["그러므로 교회가 그리스도에게 하듯 아내들도 범사에 자기 남편에게 복종할지니라","Now as the church submits to Christ, so also wives should submit in everything to their husbands."],["남편들아 아내 사랑하기를 그리스도께서 교회를 사랑하시고 그 교회를 위하여 자신을 주심 같이 하라","Husbands, love your wives, as Christ loved the church and gave himself up for her,"],["이는 곧 물로 씻어 말씀으로 깨끗하게 하사 거룩하게 하시고","that he might sanctify her, having cleansed her by the washing of water with the word,"],["자기 앞에 영광스러운 교회로 세우사 티나 주름 잡힌 것이나 이런 것들이 없이 거룩하고 흠이 없게 하려 하심이라","so that he might present the church to himself in splendor, without spot or wrinkle or any such thing, that she might be holy and without blemish."],["이와 같이 남편들도 자기 아내 사랑하기를 자기 자신과 같이 할지니 자기 아내를 사랑하는 자는 자기를 사랑하는 것이라","In the same way husbands should love their wives as their own bodies. He who loves his wife loves himself."],["누구든지 언제나 자기 육체를 미워하지 않고 오직 양육하여 보호하기를 그리스도께서 교회에게 함과 같이 하나니","For no one ever hated his own flesh, but nourishes and cherishes it, just as Christ does the church,"],["우리는 그 몸의 지체임이라","because we are members of his body."],["그러므로 사람이 부모를 떠나 그의 아내와 합하여 그 둘이 한 육체가 될지니","Therefore a man shall leave his father and mother and hold fast to his wife, and the two shall become one flesh."],["이 비밀이 크도다 나는 그리스도와 교회에 대하여 말하노라","This mystery is profound, and I am saying that it refers to Christ and the church."],["그러나 너희도 각각 자기의 아내 사랑하기를 자신 같이 하고 아내도 자기 남편을 존경하라","However, let each one of you love his wife as himself, and let the wife see that she respects her husband."]],
[["자녀들아 주 안에서 너희 부모에게 순종하라 이것이 옳으니라","Children, obey your parents in the Lord, for this is right."],["네 아버지와 어머니를 공경하라 이것은 약속이 있는 첫 계명이니","Honor your father and mother, this is the first commandment with a promise,"],["이로써 네가 잘되고 땅에서 장수하리라","that it may go well with you and that you may live long in the land."],["또 아비들아 너희 자녀를 노엽게 하지 말고 오직 주의 교훈과 훈계로 양육하라","Fathers, do not provoke your children to anger, but bring them up in the discipline and instruction of the Lord."],["종들아 두려워하고 떨며 성실한 마음으로 육체의 상전에게 순종하기를 그리스도께 하듯 하라","Bondservants, obey your earthly masters with fear and trembling, with a sincere heart, as you would Christ,"],["눈가림만 하여 사람을 기쁘게 하는 자처럼 하지 말고 그리스도의 종들처럼 마음으로 하나님의 뜻을 행하고","not by the way of eye-service, as people-pleasers, but as bondservants of Christ, doing the will of God from the heart,"],["기쁜 마음으로 섬기기를 주께 하듯 하고 사람들에게 하듯 하지 말라","rendering service with a good will as to the Lord and not to man,"],["이는 각 사람이 무슨 선을 행하든지 종이나 자유인이나 주께로부터 그대로 받을 줄을 앎이라","knowing that whatever good anyone does, this he will receive back from the Lord, whether he is a bondservant or is free."],["상전들아 너희도 그들에게 이와 같이 하고 위협을 그치라 이는 그들과 너희의 상전이 하늘에 계시고 그에게는 사람을 외모로 취하는 일이 없는 줄 너희가 앎이라","Masters, do the same to them, and stop your threatening, knowing that he who is both their Master and yours is in heaven, and that there is no partiality with him."],["끝으로 너희가 주 안에서와 그 힘의 능력으로 강건하여지고","Finally, be strong in the Lord and in the strength of his might."],["마귀의 간계를 능히 대적하기 위하여 하나님의 전신 갑주를 입으라","Put on the whole armor of God, that you may be able to stand against the schemes of the devil."],["우리의 씨름은 혈과 육을 상대하는 것이 아니요 통치자들과 권세들과 이 어둠의 세상 주관자들과 하늘에 있는 악의 영들을 상대함이라","For we do not wrestle against flesh and blood, but against the rulers, against the authorities, against the cosmic powers over this present darkness, against the spiritual forces of evil in the heavenly places."],["그러므로 하나님의 전신 갑주를 취하라 이는 악한 날에 너희가 능히 대적하고 모든 일을 행한 후에 서기 위함이라","Therefore take up the whole armor of God, that you may be able to withstand in the evil day, and having done all, to stand firm."],["그런즉 서서 진리로 너희 허리 띠를 띠고 의의 호심경을 붙이고","Stand therefore, having fastened on the belt of truth, and having put on the breastplate of righteousness,"],["평안의 복음이 준비한 것으로 신을 신고","and, as shoes for your feet, having put on the readiness given by the gospel of peace."],["모든 것 위에 믿음의 방패를 가지고 이로써 능히 악한 자의 모든 불화살을 소멸하고","In all circumstances take up the shield of faith, with which you can extinguish all the flaming darts of the evil one;"],["구원의 투구와 성령의 검 곧 하나님의 말씀을 가지라","and take the helmet of salvation, and the sword of the Spirit, which is the word of God,"],["모든 기도와 간구를 하되 항상 성령 안에서 기도하고 이를 위하여 깨어 구하기를 항상 힘쓰며 여러 성도를 위하여 구하라","praying at all times in the Spirit, with all prayer and supplication. To that end, keep alert with all perseverance, making supplication for all the saints,"],["또 나를 위하여 구할 것은 내게 말씀을 주사 나로 입을 벌려 복음의 비밀을 담대히 알리게 하옵소서 할 것이니","and also for me, that words may be given to me in opening my mouth boldly to proclaim the mystery of the gospel,"],["이 일을 위하여 내가 쇠사슬에 매인 사신이 된 것은 나로 이 일에 당연히 할 말을 담대히 하게 하려 하심이라","for which I am an ambassador in chains, that I may declare it boldly, as I ought to speak."],["나의 사정과 형편을 너희에게도 알리려 하노니 두기고가 모든 것을 너희에게 알리리라 그는 주 안에서 신실한 일꾼이요 사랑을 받는 형제라","So that you also may know how I am and what I am doing, Tychicus the beloved brother and faithful minister in the Lord will tell you everything."],["내가 그를 특별히 너희에게 보내는 것은 너희로 우리 사정을 알게 하고 또 너희 마음을 위로하게 하려 함이라","I have sent him to you for this very purpose, that you may know how we are, and that he may encourage your hearts."],["하나님 아버지와 주 예수 그리스도로부터 평강과 믿음을 겸한 사랑이 형제들에게 있을지어다","Peace be to the brothers, and love with faith, from God the Father and the Lord Jesus Christ."],["우리 주 예수 그리스도를 변함없이 사랑하는 모든 자에게 은혜가 있을지어다","Grace be with all who love our Lord Jesus Christ with love incorruptible."]]
];
var a=0;
function tabs(){var h="";for(var i=0;i<6;i++){h+="<button class='tab"+(i===a?" on":"")+"' onclick='go("+i+")'>"+"Ch."+(i+1)+"</button>";}document.getElementById("tabs").innerHTML=h;}
function show(){var r=C[a],h="";for(var i=0;i<r.length;i++){h+="<div class='row'><div class='vn'>"+(a+1)+":"+(i+1)+"</div><div class='kr'>"+r[i][0]+"</div><div class='esv'>"+r[i][1]+"</div></div>";}document.getElementById("verses").innerHTML=h;}
function go(n){a=n;tabs();show();}
tabs();show();
</script>
</body>
</html>
