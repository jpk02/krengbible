<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>krengbible.com</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root{--fs:15px;--bg:#f7f5f2;--ko-order:1;--en-order:2;--div:#e8e5e0}
*{box-sizing:border-box;margin:0;padding:0;max-width:100%}
html,body{height:100%;overflow-x:hidden}html{overscroll-behavior-y:none}body{overscroll-behavior-y:none}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:#111;display:flex;flex-direction:column;height:100%;-webkit-font-smoothing:antialiased}
header{height:48px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg);border-bottom:1px solid #e8e5e0}
.logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:#222}
nav{min-height:44px;padding:6px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--bg);border-bottom:1px solid #e8e5e0;flex-wrap:wrap;max-width:100%}
.fctl{margin-left:auto;display:flex;align-items:center;gap:3px}
.fctl>span{font-size:11px;color:#bbb;margin-right:2px}
.fbtn{background:#efecea;border:1px solid #d8d4ce;border-radius:5px;color:#666;cursor:pointer;font-size:12px;font-weight:500;width:26px;height:26px;display:flex;align-items:center;justify-content:center;user-select:none}
main{flex:1;overflow-y:scroll;overflow-x:hidden;min-height:0;background:var(--bg);max-width:100%;scrollbar-gutter:stable}
main::-webkit-scrollbar{width:10px}
main::-webkit-scrollbar-track{background:#eae7e2}
main::-webkit-scrollbar-thumb{background:#b8b4ae;border-radius:10px;border:2px solid #eae7e2}
main::-webkit-scrollbar-thumb:hover{background:#999590}
.col-headers{display:none}
.title-row{display:grid;grid-template-columns:1fr 1fr;padding:20px 0 12px}
@media(max-width:640px){
  .title-row{display:flex!important;flex-direction:row!important;align-items:baseline;gap:0;padding:14px 14px 6px}
  .title-row .ko-side,.title-row .en-side{padding:0;border:none!important}
  .title-row .ch-title{font-size:16px}
  .title-row .title-sep{color:#ccc;font-size:14px;margin:0 5px;flex-shrink:0}
}
.ko-side{padding:0 28px;border-right:1px solid #e8e5e0}
.en-side{padding:0 28px}
.ch-title{font-size:17px;font-weight:600;color:#222;letter-spacing:-.02em}
.ko-side .ch-title{font-family:'Noto Sans KR',sans-serif}
.shead-row{display:grid;grid-template-columns:1fr 1fr;padding:20px 0 4px}
.shead-row .ko-side{border-right:1px solid #e8e5e0}
.fn-row{display:grid;grid-template-columns:1fr 1fr}
.fn-row .ko-side{border-right:1px solid #e8e5e0}
.shead{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#bbb}
.verse-row{display:grid;grid-template-columns:1fr 1fr}
.verse-row:hover{background:#f0ede8}
.verse-cell{padding:5px 28px;display:flex;gap:10px;align-items:baseline}
.verse-cell.ko-side{border-right:1px solid #e8e5e0}
.vn{color:#999;font-size:10px;font-weight:600;min-width:16px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;padding-top:2px;cursor:pointer}
.vt{line-height:1.85;color:#1c1c1c;flex:1;user-select:none;-webkit-user-select:none}
.ko-side .vt{font-family:'Noto Sans KR',sans-serif;font-weight:400;word-break:keep-all;letter-spacing:-.02em}
.en-side .vt{font-family:'DM Sans',-apple-system,sans-serif;font-weight:400}
sup.fn-ref{font-size:9px;color:#2563eb;margin-left:1px;vertical-align:super;line-height:0;cursor:pointer;padding:0 1px}
.ldg{display:flex;flex-direction:column;align-items:center;gap:12px;padding:64px 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border-radius:50%;border:2px solid #e8e5e0;border-top-color:#555;animation:spin .6s linear infinite}
.ldg-txt{font-size:12px;color:#bbb}
.errbox{background:#fff5f5;border:1px solid #fecaca;border-radius:6px;color:#dc2626;padding:10px 14px;font-size:13px;line-height:1.5;margin:16px 28px}
footer{border-top:1px solid #e8e5e0;color:#bbb;background:var(--bg);font-size:10px;padding:8px 20px;text-align:center}
@media(max-width:640px){
  header{display:none}
  nav{padding:6px 12px;min-height:0}
  .title-row,.shead-row,.verse-row{grid-template-columns:1fr}
  .verse-cell{padding:6px 14px}
  .verse-cell.ko-side{border-right:0!important;border-bottom:none!important;padding-bottom:2px}
  .verse-cell.en-side{padding-top:2px;border-bottom:1px solid #e8e5e0}
  .title-row{padding:16px 14px 4px}
  .title-row .ko-side{border-right:0!important;border-bottom:none!important;padding-bottom:4px}
  .title-row .en-side{padding-top:0}
  .shead-row{padding:12px 14px 2px}
  .shead-row .ko-side{display:none}
  .fn-row{display:block!important}
  .fn-row .ko-side{display:block!important;border-right:none!important;padding:0!important}
  .fn-row .en-side{padding:0!important}
  .verse-cell.en-side .vn{visibility:hidden}
}
.mob-nav{display:none!important}
@media(max-width:640px){
  .desk-only{display:none!important}
  .mob-nav{display:flex!important;align-items:center;justify-content:space-between;width:100%}
}
.mob-passage-pill{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:13px;font-weight:600;color:#222;padding:6px 10px;font-family:inherit;cursor:pointer;flex:0 1 auto;letter-spacing:-.01em}
.mob-passage-pill span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mob-passage-pill svg{flex-shrink:0;color:#aaa}
body.dark .mob-passage-pill{color:#e8e5e0}
.desk-icon-btn{background:none;border:none;cursor:pointer;color:#666;display:flex;align-items:center;justify-content:center;width:26px;height:26px;padding:0}
.desk-icon-btn:hover{color:#111}
body.dark .desk-icon-btn{color:#999}
body.dark .desk-icon-btn:hover{color:#e8e5e0}
.mob-nav-actions{display:flex;gap:5px;flex-shrink:0}
.mob-icon-btn{background:none;border:none;font:500 14px inherit;color:#555;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer}
body.dark .mob-icon-btn{color:#aaa}
.mob-sheet{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);display:flex;align-items:flex-end}
.mob-sheet.hidden{display:none}
.mob-sheet-inner{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.mob-sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;flex-shrink:0;border-bottom:1px solid #e8e5e0}
.mob-sheet-hdr span{font-size:14px;font-weight:500;color:#222}
.mob-sheet-close{background:#efecea;border:none;border-radius:50%;width:36px;height:36px;min-width:36px;font-size:15px;color:#444;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:500;flex-shrink:0;margin-right:4px}
#mob-sheet-body{overflow-y:auto;flex:1}
.mob-book-list{display:flex;flex-direction:column}
.mob-book-row{border-bottom:.5px solid #f0ede8;cursor:pointer}
.mob-book-row-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px}
.mob-book-row-hdr .names{display:flex;align-items:baseline;gap:6px}
.mob-book-row-hdr .ko{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:#222}
.mob-book-row-hdr .en{font-size:12px;color:#999}
.mob-book-row-chevron{color:#ccc;font-size:12px;transition:transform 0.2s;flex-shrink:0}
.mob-book-row-chevron.open{transform:rotate(180deg)}
.mob-book-row.active .mob-book-row-hdr .ko{font-weight:700}
.mob-ch-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:4px 20px 16px}
body.dark .mob-book-row{border-bottom-color:#2a2a2a}
body.dark .mob-book-row-hdr .ko{color:#e8e5e0}
body.dark .mob-book-row-hdr .en{color:#666}
.mob-ch-item{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:14px;color:#222;background:#efecea;cursor:pointer}
.mob-ch-item:active{background:#d8d4ce}
.mob-ch-item.active{background:#222;color:#fff;font-weight:500}
.mob-font-sheet{padding:16px 16px 32px}
.mob-font-row{display:flex;align-items:center;gap:16px;padding:12px 0}
.mob-font-btn{background:#efecea;border:1px solid #d8d4ce;border-radius:8px;font:500 18px inherit;color:#222;width:56px;height:56px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.mob-font-preview{flex:1;font-size:15px;color:#555;text-align:center}
.edge-nav{position:fixed;top:50%;transform:translateY(-50%);z-index:50;display:none}
.edge-nav.left{left:0}.edge-nav.right{right:0}
.edge-btn{background:rgba(255,255,255,0.85);border:1px solid #e8e5e0;color:#555;font-size:20px;width:36px;height:80px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;backdrop-filter:blur(4px)}
.edge-btn:hover{background:#fff;color:#111}
.edge-btn:disabled{opacity:0.2;cursor:not-allowed}
.edge-nav.left .edge-btn{border-radius:0 8px 8px 0;border-left:none}
.edge-nav.right .edge-btn{border-radius:8px 0 0 8px;border-right:none}
@media(min-width:641px){
  .edge-nav{display:block}
  .mob-sheet{align-items:center;justify-content:center;background:rgba(0,0,0,.5)}
  .mob-sheet-inner{border-radius:12px;max-height:80vh;max-width:560px;width:100%}
  .prog-chapters{grid-template-columns:repeat(10,1fr)!important}
  .prog-books{grid-template-columns:repeat(4,1fr)!important}
}
#passage-input{flex:1;max-width:400px;background:#efecea;border:1px solid #d8d4ce;border-radius:6px;color:#111;font:14px inherit;padding:6px 12px;outline:none;min-width:0}
#passage-input:focus{border-color:#555;background:#fff}
#passage-input::placeholder{color:#bbb}
.ko-side{order:var(--ko-order)}.en-side{order:var(--en-order)}
body.dark{--bg:#1a1a1a;--div:#333;color:#e8e5e0}
body.dark header,body.dark nav,body.dark main,body.dark footer{background:var(--bg)}
body.dark header,body.dark nav{border-bottom-color:#333}
body.dark .ko-side{border-right-color:#333}
body.dark .verse-cell.en-side{border-bottom-color:#333}
body.dark .logo{color:#e8e5e0}
body.dark .verse-row:hover{background:#242424}
body.dark .vt{color:#d8d5d0}
body.dark .ch-title{color:#e8e5e0}
body.dark select,body.dark .fbtn,body.dark .mob-icon-btn,body.dark .mob-font-btn,body.dark .mob-sheet-close{background:#2a2a2a;border-color:#444;color:#ccc}
body.dark .mob-book-item{color:#d8d5d0;border-bottom-color:#2a2a2a}
body.dark .mob-book-item:active{background:#2a2a2a}
body.dark .mob-ch-item{background:#2a2a2a;color:#d8d5d0}
body.dark .mob-sheet-inner,body.dark #mob-sheet-body{background:#1a1a1a}
body.dark .mob-sheet-hdr{border-bottom-color:#333}
body.dark .mob-sheet-hdr span{color:#e8e5e0}
body.dark .mob-ch-item.active{background:#e8e5e0;color:#111}
body.dark #passage-input{background:#2a2a2a;border-color:#444;color:#e8e5e0}
body.dark #passage-input::placeholder{color:#555}
body.dark .edge-btn{background:rgba(30,30,30,0.85);border-color:#444;color:#aaa}
body.dark main::-webkit-scrollbar-track{background:#222}
body.dark main::-webkit-scrollbar-thumb{background:#444}
.prog-books{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:4px 20px 8px}
.prog-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prog-bar-track{flex:1;height:6px;background:#efecea;border-radius:3px;overflow:hidden}
.prog-bar-fill{height:100%;background:#2563eb;border-radius:3px;transition:width 0.3s}
.prog-book-list{display:flex;flex-direction:column}
.prog-book-row{border-bottom:.5px solid #f0ede8;cursor:pointer}
.prog-book-row-hdr{display:flex;align-items:center;padding:10px 20px;gap:12px}
.prog-book-row-name{flex:1;min-width:0;display:flex;align-items:baseline;gap:6px}
.prog-book-row-primary{font-size:14px;font-weight:500;color:#222;font-family:'Noto Sans KR',sans-serif}
.prog-book-row-secondary{font-size:12px;color:#999}
.prog-book-row-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.prog-book-row-pct{font-size:11px;color:#555;min-width:28px;text-align:right}
.prog-book-mini-bar{width:48px;height:3px;background:#efecea;border-radius:2px;overflow:hidden}
.prog-book-mini-fill{height:100%;background:#2563eb;border-radius:2px}
.prog-book-row-chevron2{color:#ccc;transition:transform 0.2s}
.prog-book-row-chevron2.open{transform:rotate(180deg)}
.prog-book-row.complete .prog-book-row-primary{color:#2563eb}
.prog-testament-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#555;margin-bottom:6px}
.prog-bar-label{font-size:12px;color:#555;width:60px;flex-shrink:0}
.prog-bar-pct{font-size:11px;color:#555;width:32px;text-align:right;flex-shrink:0}
body.dark .prog-book-row{border-bottom-color:#2a2a2a}
body.dark .prog-book-row-primary{color:#e8e5e0}
body.dark .prog-book-row.complete .prog-book-row-primary{color:#60a5fa}
body.dark .prog-book-mini-bar{background:#333}
body.dark .prog-testament-title{color:#aaa}
body.dark .prog-bar-label{color:#aaa}
body.dark .prog-bar-pct{color:#aaa}
.prog-chapters{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:16px 20px}
.prog-ch{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;cursor:pointer;position:relative}
.prog-ch.unread{background:#efecea;color:#555}
.prog-ch.auto{background:#2563eb;color:#fff}
.prog-ch.manual{background:#1d4ed8;color:#fff}
.prog-ch.auto::after{content:'';position:absolute;bottom:3px;right:3px;width:4px;height:4px;background:rgba(255,255,255,.6);border-radius:50%}
.prog-back-btn{background:none;border:none;color:#2563eb;font:500 13px inherit;cursor:pointer;padding:4px 0}
body.dark .prog-ch.unread{background:#2a2a2a;color:#999}
body.dark .prog-bar-track{background:#2a2a2a}
body.dark .prog-back-btn{color:#60a5fa}
.intro-wrap{padding:20px 20px 40px;max-width:680px}
.intro-section{margin-bottom:24px}
.intro-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1b2a4a;margin-bottom:8px}
body.dark .intro-label{color:#8899bb}
.intro-ko{font-family:'Noto Sans KR',sans-serif;font-size:15px;line-height:1.85;color:#1c1c1c;margin-bottom:6px;word-break:keep-all}
.intro-en{font-size:14px;line-height:1.75;color:#555;font-style:italic;margin-bottom:6px}
body.dark .intro-ko{color:#e8e5e0}
body.dark .intro-en{color:#999}
.intro-themes{display:flex;flex-direction:column;gap:12px;margin-top:4px}
.intro-theme{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #e8e5e0}
body.dark .intro-theme{background:#242424;border-color:#333}
.intro-theme-title{font-size:13px;font-weight:600;color:#1b2a4a;margin-bottom:4px}
body.dark .intro-theme-title{color:#a8b8d8}
.intro-theme-ko{font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.7;color:#444;word-break:keep-all}
.intro-theme-en{font-size:12px;line-height:1.6;color:#777;font-style:italic}
body.dark .intro-theme-ko{color:#ccc}
body.dark .intro-theme-en{color:#888}
.intro-map{width:100%;height:220px;border-radius:12px;overflow:hidden;margin-top:8px;border:1px solid #e8e5e0}
body.dark .intro-map{border-color:#333};gap:0;border-bottom:1px solid #e8e5e0;margin:0 14px;flex-shrink:0}
.ch-tab{background:none;border:none;font:500 13px inherit;color:#999;padding:8px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.ch-tab.active{color:#1b2a4a;border-bottom-color:#1b2a4a}
body.dark .ch-tab.active{color:#e8e5e0;border-bottom-color:#e8e5e0}
.commentary-wrap{padding:20px 20px 40px;max-width:680px}
.commentary-section{margin-bottom:24px}
.commentary-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1b2a4a;margin-bottom:6px}
body.dark .commentary-label{color:#8899bb}
.commentary-ko{font-family:'Noto Sans KR',sans-serif;font-size:15px;line-height:1.85;color:#1c1c1c;margin-bottom:8px;word-break:keep-all}
.commentary-en{font-size:14px;line-height:1.75;color:#555;font-style:italic}
body.dark .commentary-ko{color:#e8e5e0}
body.dark .commentary-en{color:#999}
.fn-popup{position:fixed;z-index:200;background:#fff;border:1px solid #e8e5e0;border-radius:8px;padding:10px 14px;max-width:280px;font-size:12px;color:#444;line-height:1.6;box-shadow:0 4px 16px rgba(0,0,0,.12);pointer-events:none;transition:opacity .15s}
body.dark .fn-popup{background:#2a2a2a;border-color:#444;color:#ccc}
.votd-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;min-height:60vh}
.votd-card{background:#fff;border-radius:20px;padding:28px 24px 24px;max-width:420px;width:100%;box-shadow:0 2px 20px rgba(0,0,0,.07);display:flex;flex-direction:column}
body.dark .votd-card{background:#242424;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.votd-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#1b2a4a;margin-bottom:18px}
body.dark .votd-label{color:#8899bb}

.votd-ko-ref{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:600;color:#aaa;margin-bottom:5px}
.votd-ko{font-family:'Noto Sans KR',sans-serif;font-size:18px;line-height:1.85;color:#1c1c1c;word-break:keep-all;margin-bottom:20px}
body.dark .votd-ko{color:#e8e5e0}
.votd-divider{height:1px;background:#f0ede8;margin-bottom:18px}
body.dark .votd-divider{background:#333}
.votd-en-ref{font-size:11px;font-weight:600;color:#aaa;margin-bottom:5px}
.votd-en{font-size:15px;line-height:1.75;color:#555;font-style:italic;margin-bottom:24px}
body.dark .votd-en{color:#999}
.votd-read-btn{align-self:flex-start;background:#1b2a4a;border:none;border-radius:10px;color:#fff;cursor:pointer;font:500 13px inherit;padding:9px 20px}
.votd-read-btn:active{opacity:.85}
body.dark .votd-read-btn{background:#2a3d66}
.verse-row.hl-selected .vt{text-decoration:underline;text-decoration-style:dashed;text-decoration-color:#888;text-decoration-thickness:2px;text-underline-offset:4px}
.hl-bar{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid #e8e5e0;padding:14px 28px env(safe-area-inset-bottom);display:flex;align-items:center;gap:16px;transform:translateY(100%);transition:transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94)}
.hl-bar.visible{transform:translateY(0)}
body.dark .hl-bar{background:#1e1e1e;border-top-color:#333}
.hl-bar-handle{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:36px;height:4px;background:#d8d4ce;border-radius:2px}
body.dark .hl-bar-handle{background:#444}
.hl-bar-swatches{display:flex;gap:14px;align-items:center}
.hl-bar-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;flex-shrink:0;transition:transform 0.1s}
.hl-bar-swatch:active{transform:scale(1.15)}
.hl-bar-swatch.active{border-color:#333}
body.dark .hl-bar-swatch.active{border-color:#fff}
.hl-bar-copy{background:none;border:none;cursor:pointer;color:#555;padding:0;line-height:1;display:flex;align-items:center;margin-left:4px}
body.dark .hl-bar-copy{color:#aaa}
.hl-bar-copy svg{width:26px;height:26px}
.hl-bar-clear{background:none;border:none;font-size:18px;cursor:pointer;color:#bbb;padding:0;line-height:1;margin-left:auto}
.hl-bar-clear:active{color:#dc2626}
.verse-row.hl-y .vt{background:#fde047;border-radius:3px}
.verse-row.hl-g .vt{background:#86efac;border-radius:3px}
.verse-row.hl-b .vt{background:#93c5fd;border-radius:3px}
.verse-row.hl-p .vt{background:#d8b4fe;border-radius:3px}
.verse-row.hl-r .vt{background:#fca5a5;border-radius:3px}
body.dark .verse-row.hl-y .vt{background:#854d0e}

<script>
const WORKER='https://krengbible.pauljkim22.workers.dev';
const BOOKS=[{ko:"창세기",en:"Genesis",n:1,ch:50},{ko:"출애굽기",en:"Exodus",n:2,ch:40},{ko:"레위기",en:"Leviticus",n:3,ch:27},{ko:"민수기",en:"Numbers",n:4,ch:36},{ko:"신명기",en:"Deuteronomy",n:5,ch:34},{ko:"여호수아",en:"Joshua",n:6,ch:24},{ko:"사사기",en:"Judges",n:7,ch:21},{ko:"룻기",en:"Ruth",n:8,ch:4},{ko:"사무엘상",en:"1 Samuel",n:9,ch:31},{ko:"사무엘하",en:"2 Samuel",n:10,ch:24},{ko:"열왕기상",en:"1 Kings",n:11,ch:22},{ko:"열왕기하",en:"2 Kings",n:12,ch:25},{ko:"역대상",en:"1 Chronicles",n:13,ch:29},{ko:"역대하",en:"2 Chronicles",n:14,ch:36},{ko:"에스라",en:"Ezra",n:15,ch:10},{ko:"느헤미야",en:"Nehemiah",n:16,ch:13},{ko:"에스더",en:"Esther",n:17,ch:10},{ko:"욥기",en:"Job",n:18,ch:42},{ko:"시편",en:"Psalms",n:19,ch:150},{ko:"잠언",en:"Proverbs",n:20,ch:31},{ko:"전도서",en:"Ecclesiastes",n:21,ch:12},{ko:"아가",en:"Song of Solomon",n:22,ch:8},{ko:"이사야",en:"Isaiah",n:23,ch:66},{ko:"예레미야",en:"Jeremiah",n:24,ch:52},{ko:"예레미야애가",en:"Lamentations",n:25,ch:5},{ko:"에스겔",en:"Ezekiel",n:26,ch:48},{ko:"다니엘",en:"Daniel",n:27,ch:12},{ko:"호세아",en:"Hosea",n:28,ch:14},{ko:"요엘",en:"Joel",n:29,ch:3},{ko:"아모스",en:"Amos",n:30,ch:9},{ko:"오바댜",en:"Obadiah",n:31,ch:1},{ko:"요나",en:"Jonah",n:32,ch:4},{ko:"미가",en:"Micah",n:33,ch:7},{ko:"나훔",en:"Nahum",n:34,ch:3},{ko:"하박국",en:"Habakkuk",n:35,ch:3},{ko:"스바냐",en:"Zephaniah",n:36,ch:3},{ko:"학개",en:"Haggai",n:37,ch:2},{ko:"스가랴",en:"Zechariah",n:38,ch:14},{ko:"말라기",en:"Malachi",n:39,ch:4},{ko:"마태복음",en:"Matthew",n:40,ch:28},{ko:"마가복음",en:"Mark",n:41,ch:16},{ko:"누가복음",en:"Luke",n:42,ch:24},{ko:"요한복음",en:"John",n:43,ch:21},{ko:"사도행전",en:"Acts",n:44,ch:28},{ko:"로마서",en:"Romans",n:45,ch:16},{ko:"고린도전서",en:"1 Corinthians",n:46,ch:16},{ko:"고린도후서",en:"2 Corinthians",n:47,ch:13},{ko:"갈라디아서",en:"Galatians",n:48,ch:6},{ko:"에베소서",en:"Ephesians",n:49,ch:6},{ko:"빌립보서",en:"Philippians",n:50,ch:4},{ko:"골로새서",en:"Colossians",n:51,ch:4},{ko:"데살로니가전서",en:"1 Thessalonians",n:52,ch:5},{ko:"데살로니가후서",en:"2 Thessalonians",n:53,ch:3},{ko:"디모데전서",en:"1 Timothy",n:54,ch:6},{ko:"디모데후서",en:"2 Timothy",n:55,ch:4},{ko:"디도서",en:"Titus",n:56,ch:3},{ko:"빌레몬서",en:"Philemon",n:57,ch:1},{ko:"히브리서",en:"Hebrews",n:58,ch:13},{ko:"야고보서",en:"James",n:59,ch:5},{ko:"베드로전서",en:"1 Peter",n:60,ch:5},{ko:"베드로후서",en:"2 Peter",n:61,ch:3},{ko:"요한일서",en:"1 John",n:62,ch:5},{ko:"요한이서",en:"2 John",n:63,ch:1},{ko:"요한삼서",en:"3 John",n:64,ch:1},{ko:"유다서",en:"Jude",n:65,ch:1},{ko:"요한계시록",en:"Revelation",n:66,ch:22}];
let bi=42,ci=3,fs=15,pendingBook=null,loaded=false,langOrder="ko-en",darkMode=false;
(function(){
  applyFs();
  document.getElementById('fminus').addEventListener('click',()=>{fs=Math.max(11,fs-1);applyFs();});
  document.getElementById('fplus').addEventListener('click',()=>{fs=Math.min(22,fs+1);applyFs();});
  const inp=document.getElementById('passage-input');
  if(inp) inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();parseAndLoad(inp.value.trim());}});
  updateLabel();
  if(window.innerWidth<=640) loadVotd();
  document.getElementById('mob-sheet').addEventListener('click',function(e){if(e.target===this)sheetClose();});
  var si=document.querySelector('.mob-sheet-inner'),sh=document.querySelector('.mob-sheet-hdr'),swy=0,swa=false;
  sh.addEventListener('touchstart',function(e){swy=e.touches[0].clientY;swa=true;},{passive:true});
  sh.addEventListener('touchmove',function(e){if(!swa)return;var dy=e.touches[0].clientY-swy;if(dy>0)si.style.transform='translateY('+Math.min(dy,300)+'px)';},{passive:true});
  sh.addEventListener('touchend',function(e){if(!swa)return;swa=false;var dy=e.changedTouches[0].clientY-swy;if(dy>100){si.style.transition='transform 0.2s ease';si.style.transform='translateY(100%)';setTimeout(function(){si.style.transform='';si.style.transition='';sheetClose();},200);}else{si.style.transition='transform 0.2s ease';si.style.transform='';setTimeout(function(){si.style.transition='';},200);}},{passive:true});
  sh.addEventListener('touchcancel',function(){swa=false;si.style.transform='';},{passive:true});
})();
function applyFs(){document.documentElement.style.setProperty('--fs',fs+'px');document.querySelectorAll('.vt').forEach(el=>el.style.fontSize=fs+'px');}
function updateLabel(){
  var lbl=loaded?(langOrder==='en-ko'?BOOKS[bi].en+' '+ci+' / '+BOOKS[bi].ko+' '+ci+'장':BOOKS[bi].ko+' '+ci+'장 / '+BOOKS[bi].en+' '+ci):(langOrder==='en-ko'?'Select Book / 책 선택':'책 선택 / Select Book');
  document.getElementById('mob-passage-label').textContent=lbl;
}
function step(d){
  if(d===-1){if(ci>1)ci--;else if(bi>0){bi--;ci=BOOKS[bi].ch;}}
  else{if(ci<BOOKS[bi].ch)ci++;else if(bi<BOOKS.length-1){bi++;ci=1;}}
  load();
}
function parseAndLoad(raw){
  if(!raw)return;
  const cleaned=raw.trim().replace(/:/g,' ');
  const parts=cleaned.match(/^(.+?)\s+(\d+)(?:\s+(\d+))?$/);
  if(!parts)return;
  const bookQuery=parts[1].trim().toLowerCase(),chNum=parseInt(parts[2]),koQuery=parts[1].trim();
  const idx=BOOKS.findIndex(b=>{
    const enL=b.en.toLowerCase(),enNS=enL.replace(/\s+/g,''),bqNS=bookQuery.replace(/\s+/g,'');
    if(enL.startsWith(bookQuery))return true;
    if(enNS.startsWith(bqNS))return true;
    if(b.ko.startsWith(koQuery))return true;
    if(koQuery.length<=3&&b.ko.startsWith(koQuery))return true;
    const initials=b.en.split(' ').map(w=>w[0].toLowerCase()).join('');
    if(initials.startsWith(bookQuery))return true;
    if(enL.slice(0,bookQuery.length)===bookQuery&&bookQuery.length>=2)return true;
    return false;
  });
  if(idx===-1){const inp=document.getElementById('passage-input');if(inp){inp.style.borderColor='#dc2626';setTimeout(()=>{inp.style.borderColor='';},1000);}return;}
  bi=idx;ci=Math.min(Math.max(1,chNum),BOOKS[idx].ch);load();
}
function toggleLangOrder(btn){
  langOrder=langOrder==='ko-en'?'en-ko':'ko-en';
  if(btn)btn.textContent=langOrder==='ko-en'?'한':'Eng';
  updateLabel();
  if(loaded)applyLangOrder();
  // Update title row order
  var koSide=document.querySelector('.title-row .ko-side');
  var enSide=document.querySelector('.title-row .en-side');
  if(koSide&&enSide){koSide.style.order=langOrder==='ko-en'?1:2;enSide.style.order=langOrder==='ko-en'?2:1;}
  // Update tab labels
  var tabText=document.getElementById('tab-text');var tabComm=document.getElementById('tab-comm');
  if(tabText)tabText.textContent=langOrder==='ko-en'?'본문':'Text';
  if(tabComm)tabComm.textContent=langOrder==='ko-en'?'해설':'Commentary';
  // Update VOTD button if visible
  var koBtn=document.querySelector('.votd-btn-ko');
  var enBtn=document.querySelector('.votd-btn-en');
  if(koBtn) koBtn.style.display=langOrder==='en-ko'?'none':'';
  if(enBtn) enBtn.style.display=langOrder==='ko-en'?'none':'';
  if(!document.getElementById('mob-sheet').classList.contains('hidden')){
    if(progView==='overview')progShowOverview();
    else if(pendingBook===null)sheetOpen('passage');
  }
}
function applyLangOrder(){
  var sid='lang-order-style',ex=document.getElementById(sid);if(ex)ex.remove();
  if(langOrder==='en-ko'){
    var s=document.createElement('style');s.id=sid;
    s.textContent='.verse-cell.ko-side{order:2;box-shadow:0 1px 0 0 var(--div);padding-top:2px!important;padding-bottom:6px!important}.verse-cell.en-side{order:1;border-bottom:none!important;padding-top:6px!important;padding-bottom:2px!important}.verse-row{display:flex;flex-direction:column}.fn-row{display:flex!important;flex-direction:column}.fn-row .ko-side{order:2!important}.fn-row .en-side{order:1!important}.verse-cell.en-side .vn{visibility:visible!important}.verse-cell.ko-side .vn{visibility:hidden!important}';
    document.head.appendChild(s);
  }
}
function toggleDark(btn){
  darkMode=!darkMode;
  document.body.classList.toggle('dark',darkMode);
  document.querySelectorAll('#mob-dark-btn,#desk-dark-btn').forEach(b=>b.textContent=darkMode?'◑':'◐');
}
var PROGRESS_KEY='krengbible_progress';
function progLoad(){try{return JSON.parse(localStorage.getItem(PROGRESS_KEY)||'{}');}catch(e){return {};}}
function progSave(d){try{localStorage.setItem(PROGRESS_KEY,JSON.stringify(d));}catch(e){}}
function progKey(b,c){return b+'_'+c;}
function progMarkRead(b,c,src){var d=progLoad(),k=progKey(b,c);if(!d[k]){d[k]={date:new Date().toISOString().slice(0,10),source:src};progSave(d);}}
function progToggleManual(b,c){
  var d=progLoad(),k=progKey(b,c);
  if(d[k])delete d[k];else d[k]={date:new Date().toISOString().slice(0,10),source:'manual'};
  progSave(d);
  // Refresh the inline chapter grid
  var grid=document.getElementById('prog-ch-'+b);
  if(grid&&grid.style.display!=='none'){
    var bk=BOOKS[b],data=progLoad(),h='';
    for(var ch=1;ch<=bk.ch;ch++){var ky=progKey(b,ch),entry=data[ky],cls=entry?(entry.source==='auto'?'auto':'manual'):'unread';h+='<div class="prog-ch '+cls+'" onclick="progToggleManual('+b+','+ch+')" title="'+(entry?entry.date:'Tap to mark read')+'">'+ch+'</div>';}
    grid.innerHTML=h;
  }
  // Refresh mini bar
  var row=document.getElementById('prog-row-'+b);
  if(row){
    var bk2=BOOKS[b],data2=progLoad(),rc=0;
    for(var ch2=1;ch2<=bk2.ch;ch2++)if(data2[progKey(b,ch2)])rc++;
    var pct=Math.round(rc/bk2.ch*100);
    var fill=row.querySelector('.prog-book-mini-fill');
    if(fill)fill.style.width=pct+'%';
    var pctEl=row.querySelector('.prog-book-row-pct');
    if(pctEl)pctEl.textContent=rc>0?pct+'%':'';
    row.className='prog-book-row'+(rc===bk2.ch?' complete':rc>0?' partial':'');
  }
}
var progObserver=null;
function progAttachObserver(){
  if(progObserver){progObserver.disconnect();progObserver=null;}
  var rows=document.querySelectorAll('.verse-row'),last=rows[rows.length-1];
  if(!last||!loaded)return;
  progObserver=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){progMarkRead(bi,ci,'auto');progObserver.disconnect();}});},{root:document.getElementById('main'),threshold:0.1});
  progObserver.observe(last);
}
var progView='overview',progViewBook=0;
var _confirmCb=null;
function showConfirm(msg,cb){
  var isKo=langOrder==='ko-en';
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-cancel-btn').textContent=isKo?'취소':'Cancel';
  document.getElementById('confirm-ok-btn').textContent=isKo?'초기화':'Reset';
  document.getElementById('confirm-modal').classList.remove('hidden');
  _confirmCb=cb;
}
function confirmOk(){document.getElementById('confirm-modal').classList.add('hidden');if(_confirmCb)_confirmCb();_confirmCb=null;}
function confirmCancel(){document.getElementById('confirm-modal').classList.add('hidden');_confirmCb=null;}
function progReset(){
  var msg=langOrder==='ko-en'?'읽기 진도를 초기화할까요? 되돌릴 수 없습니다.':'Reset all reading progress? This cannot be undone.';
  showConfirm(msg,function(){localStorage.removeItem(PROGRESS_KEY);progShowOverview();});
}
function progShowOverview(){
  progView='overview';
  document.getElementById('mob-sheet-title').textContent=langOrder==='en-ko'?'Reading Progress / 성경 읽기 진도':'성경 읽기 진도 / Reading Progress';
  var data=progLoad(),OT=BOOKS.slice(0,39),NT=BOOKS.slice(39);
  function bookStats(books,si){var t=0,r=0;books.forEach(function(b,i){t+=b.ch;for(var c=1;c<=b.ch;c++)if(data[progKey(si+i,c)])r++;});return{total:t,read:r};}
  var otS=bookStats(OT,0),ntS=bookStats(NT,39);
  var html='<div style="padding:0">';
  html+='<div class="prog-testament" style="padding:8px 20px 0"><div class="prog-testament-title">'+(langOrder==='en-ko'?'Old Testament / 구약':'구약 / Old Testament')+'</div>';
  html+='<div class="prog-bar-row"><span class="prog-bar-label">'+otS.read+'/'+otS.total+'</span><div class="prog-bar-track"><div class="prog-bar-fill" style="width:'+Math.round(otS.read/otS.total*100)+'%"></div></div><span class="prog-bar-pct">'+Math.round(otS.read/otS.total*100)+'%</span></div></div>';
  html+='<div class="prog-testament" style="padding:0 20px 0"><div class="prog-testament-title">'+(langOrder==='en-ko'?'New Testament / 신약':'신약 / New Testament')+'</div>';
  html+='<div class="prog-bar-row"><span class="prog-bar-label">'+ntS.read+'/'+ntS.total+'</span><div class="prog-bar-track"><div class="prog-bar-fill" style="width:'+Math.round(ntS.read/ntS.total*100)+'%"></div></div><span class="prog-bar-pct">'+Math.round(ntS.read/ntS.total*100)+'%</span></div></div></div>';
  html+='<div class="prog-book-list">';
  BOOKS.forEach(function(b,i){
    var rc=0;for(var c=1;c<=b.ch;c++)if(data[progKey(i,c)])rc++;
    var pct=Math.round(rc/b.ch*100);
    var cls=rc===b.ch?'complete':rc>0?'partial':'';
    var p=langOrder==='en-ko'?b.en:b.ko, s=langOrder==='en-ko'?b.ko:b.en;
    html+='<div class="prog-book-row '+cls+'" id="prog-row-'+i+'">';
    html+='<div class="prog-book-row-hdr" onclick="toggleProgBook('+i+')">';
    html+='<div class="prog-book-row-name"><div class="prog-book-row-primary">'+p+'</div><div class="prog-book-row-secondary">'+s+'</div></div>';    html+='<div class="prog-book-row-right">';

async function fetchEsv(bk,ch){

  // Background
  h+='<div class="intro-section"><div class="intro-label">'+bl+'</div>';
  if(isEn){h+='<div class="intro-en">'+esc(d.background_en)+'</div><div class="intro-ko">'+esc(d.background_ko)+'</div>';}
  else{h+='<div class="intro-ko">'+esc(d.background_ko)+'</div><div class="intro-en">'+esc(d.background_en)+'</div>';}
  h+='</div>';
  // Themes
  h+='<div class="intro-section"><div class="intro-label">'+tl+'</div><div class="intro-themes">';
  var themes=isEn?d.themes_en:d.themes_ko;
  var themes2=isEn?d.themes_ko:d.themes_en;
  if(themes&&themes.length){themes.forEach(function(t,i){
    h+='<div class="intro-theme"><div class="intro-theme-title">'+esc(t.title)+'</div>';
    if(isEn){h+='<div class="intro-theme-en">'+esc(t.desc)+'</div>';if(themes2&&themes2[i])h+='<div class="intro-theme-ko">'+esc(themes2[i].desc)+'</div>';}
    else{h+='<div class="intro-theme-ko">'+esc(t.desc)+'</div>';if(themes2&&themes2[i])h+='<div class="intro-theme-en">'+esc(themes2[i].desc)+'</div>';}
    h+='</div>';
  });}
  h+='</div></div>';
  // Geo + Map
  h+='<div class="intro-section"><div class="intro-label">'+gl+'</div>';
  if(isEn){h+='<div class="intro-en">'+esc(d.geo_en)+'</div><div class="intro-ko">'+esc(d.geo_ko)+'</div>';}
  else{h+='<div class="intro-ko">'+esc(d.geo_ko)+'</div><div class="intro-en">'+esc(d.geo_en)+'</div>';}
  if(d.map_locations&&d.map_locations.length){
    h+='<div class="intro-map" id="intro-map"></div>';
  }
  h+='</div>';
  h+='</div>';
  document.getElementById('content').innerHTML=h;
  // Init Leaflet map
  if(d.map_locations&&d.map_locations.length&&window.L){
    setTimeout(function(){
      var mapEl=document.getElementById('intro-map');
      if(!mapEl)return;
      var locs=d.map_locations;
      var map=L.map('intro-map',{zoomControl:true,attributionControl:false});
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      var bounds=[];
      locs.forEach(function(loc){
        var marker=L.marker([loc.lat,loc.lng]).addTo(map);
        marker.bindPopup('<b>'+loc.name+'</b><br><small>'+loc.desc+'</small>');
        bounds.push([loc.lat,loc.lng]);
      });
      if(bounds.length>1)map.fitBounds(bounds,{padding:[20,20]});
      else if(bounds.length===1)map.setView(bounds[0],7);
    },100);
  }
}
function switchTab(tab){
  var tText=document.getElementById('tab-text-content');
  var tComm=document.getElementById('tab-comm-content');
  var btnText=document.getElementById('tab-text');
  var btnComm=document.getElementById('tab-comm');
  if(tab==='text'){
    tText.style.display='';tComm.style.display='none';
    btnText.classList.add('active');btnComm.classList.remove('active');
  } else {
    tText.style.display='none';tComm.style.display='';
    btnText.classList.remove('active');btnComm.classList.add('active');
    if(tComm.querySelector('.ldg')) loadCommentary();
  }
}
async function loadCommentary(){
  var bk=BOOKS[bi];
  var tComm=document.getElementById('tab-comm-content');
  if(!tComm) return;
  tComm.innerHTML='<div class="ldg"><div class="spinner"></div><div class="ldg-txt">'+(langOrder==='ko-en'?'해설 불러오는 중…':'Loading commentary…')+'</div></div>';
  try{
    var url=WORKER+'/commentary/'+bk.n+'/'+ci;
    console.log('Commentary fetch:',url);
    var r=await fetch(url);
    console.log('Commentary status:',r.status);
    if(!r.ok) throw new Error('Worker error '+r.status);
    var d=await r.json();
    console.log('Commentary data:',d);
    if(d.error) throw new Error(d.error+(d.detail?' — '+d.detail:''));
    var sl=langOrder==='ko-en'?'요약':'Synopsis';
    var cl=langOrder==='ko-en'?'역사적 배경':'Historical Context';
    var rl=langOrder==='ko-en'?'묵상':'Reflection';
    var h='<div class="commentary-wrap">';
    h+='<div class="commentary-section"><div class="commentary-label">'+sl+'</div>';
    if(langOrder==='ko-en'){h+='<div class="commentary-ko">'+esc(d.summary_ko)+'</div><div class="commentary-en">'+esc(d.summary_en)+'</div>';}
    else{h+='<div class="commentary-en">'+esc(d.summary_en)+'</div><div class="commentary-ko">'+esc(d.summary_ko)+'</div>';}
    h+='</div>';
    h+='<div class="commentary-section"><div class="commentary-label">'+cl+'</div>';
    if(langOrder==='ko-en'){h+='<div class="commentary-ko">'+esc(d.context_ko)+'</div><div class="commentary-en">'+esc(d.context_en)+'</div>';}
    else{h+='<div class="commentary-en">'+esc(d.context_en)+'</div><div class="commentary-ko">'+esc(d.context_ko)+'</div>';}
    h+='</div>';
    h+='<div class="commentary-section"><div class="commentary-label">'+rl+'</div>';
    if(langOrder==='ko-en'){h+='<div class="commentary-ko">'+esc(d.reflection_ko)+'</div><div class="commentary-en">'+esc(d.reflection_en)+'</div>';}
    else{h+='<div class="commentary-en">'+esc(d.reflection_en)+'</div><div class="commentary-ko">'+esc(d.reflection_ko)+'</div>';}
    h+='</div></div>';
    tComm.innerHTML=h;
  } catch(e){
    tComm.innerHTML='<div class="errbox">Commentary failed: '+esc(e.message)+'</div>';
  }
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
document.addEventListener('keydown',function(e){if(e.target.tagName==='SELECT'||e.target.id==='passage-input')return;if(e.key==='ArrowRight')step(1);if(e.key==='ArrowLeft')step(-1);});
</script>
